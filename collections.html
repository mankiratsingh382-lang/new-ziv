<html lang="en">
<head>

  <title>Shop ZIVARR Collections | Luxury Jewellery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-shell{min-height:100svh;padding:110px 24px 72px;background:linear-gradient(180deg,#fffafc 0%, #fff 54%, #fff7f8 100%);}
    .page-wrap{max-width:1200px;margin:0 auto;display:grid;gap:24px;}
    .glass-panel{background:rgba(255,255,255,.78);backdrop-filter:blur(18px);border:1px solid rgba(212,114,126,.18);border-radius:28px;box-shadow:0 18px 50px rgba(61,24,32,.08);padding:24px;}
    .eyebrow{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--pink-mid);} 
    .featured-heading{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,4.2vw,56px);font-weight:400;color:var(--rose-dark);line-height:1.05;margin:2px 0 18px;letter-spacing:-0.2px;}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,7vw,70px);font-weight:400;color:var(--rose-dark);margin-top:8px;}
    .page-copy{max-width:700px;color:var(--text-muted);line-height:1.8;font-size:14px;}
    .chip-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;border:1px solid rgba(212,114,126,.25);background:rgba(255,255,255,.85);color:var(--rose-mid);text-decoration:none;font-size:11px;letter-spacing:2px;text-transform:uppercase;}
    .chip:hover{background:rgba(245,213,218,.65);}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;} .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
    .collection-card{display:grid;gap:10px;padding:18px;border-radius:22px;background:linear-gradient(145deg,rgba(255,255,255,.88),rgba(248,235,238,.82));border:1px solid rgba(212,114,126,.18);box-shadow:0 14px 40px rgba(181,80,92,.08);} .collection-card h3{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--rose-dark);} .collection-card p{color:var(--text-muted);font-size:13px;line-height:1.8;}
    .product-card{padding:18px;border-radius:24px;background:linear-gradient(145deg,rgba(255,255,255,.9),rgba(245,233,236,.82));border:1px solid rgba(212,114,126,.18);display:grid;gap:10px;transition:transform .35s, box-shadow .35s;} .product-card:hover{transform:translateY(-4px);box-shadow:0 18px 36px rgba(181,80,92,.14);} .badge{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;background:rgba(181,80,92,.12);color:var(--rose-mid);font-size:9px;letter-spacing:2px;text-transform:uppercase;} .price{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--rose-dark);} .muted{color:var(--text-muted);font-size:12px;line-height:1.7;}
    @media (max-width:980px){.grid-3,.grid-2{grid-template-columns:1fr 1fr;} } @media (max-width:680px){.grid-3,.grid-2{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div id="preloader">
    <div class="pre-logo">
      <img class="pre-logo-img" src="images/IMG_6489.JPG" alt="ZIVARR" />
    </div>
    <div class="pre-line"></div>
    <div class="pre-tag">Thoughtfully Made · Beautifully Worn</div>
  </div>

  <div id="cur"></div><div id="cur-r"></div>
  <nav id="main-nav">
    <a class="nav-logo" href="index.html" aria-label="ZIVARR">
      <img class="nav-logo-img" src="images/IMG_6489.JPG" alt="ZIVARR" />
    </a>

    <ul class="nav-links"><li><a href="collections.html">Collections</a></li><li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li><li><a href="dashboard.html">Account</a></li></ul>
    <div class="nav-actions"><a href="login.html" class="btn-ghost">Login</a><button id="cartToggle" aria-label="Cart"><svg viewBox="0 0 24 24"><path d="M3 4h2l2 10h10l2-8H7"/><circle cx="10" cy="19" r="1.5"/><circle cx="17" cy="19" r="1.5"/></svg><span class="cart-dot">0</span></button></div>
  </nav>
  <main class="page-shell">
    <section class="page-wrap">
      <article class="glass-panel">
        <h2 class="featured-heading">Featured pieces</h2>
        <div class="grid-2" id="productGrid"></div>
      </article>
    </section>
  </main>
  <script>
    const neonConnectionString = 'postgresql://neondb_owner:npg_n2i5vWTSCHus@ep-wild-dew-ahi26wh0-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require';
    const collectionData = [
      {title:'All Jewelry',desc:'A full view of our modern heirlooms — chokers, rings, earrings, and statement pieces.',tag:'Signature'},
      {title:'Necklaces',desc:'Soft silhouettes and sculpted chokers designed for layering or a solo statement.',tag:'Layered'},
      {title:'Rings',desc:'Sculpted rings with clean lines, gemstone glow, and everyday comfort.',tag:'Signature'},
      {title:'Earrings',desc:'Lightweight drops and studs with luminous movement and polished finish.',tag:'Everyday'},
      {title:'Turkish Collection',desc:'An inspired heritage edit with rich metals, warm gold tones, and ornate textures.',tag:'Heritage'}
    ];
    const productData = [];
    fetch('/api/products', { headers: { 'X-Neon-Connection': neonConnectionString } })
      .then(r => r.json())
      .then(data => { productData.push(...data); render(); })
      .catch(() => renderFallback());
    function renderFallback(){
      productData.push({id:1,name:'Seraphine Choker',category:'Necklaces',price:3499,material:'Sterling Silver · Rhodium',description:'Signature choker with sculpted sparkle.'},{id:2,name:'Luna Drop Earrings',category:'Earrings',price:2199,material:'18K Gold Plated',description:'Lightweight drop earrings with luminous movement.'});
      render();
    }
    function render(){
      document.getElementById('productGrid').innerHTML = productData.map(product=>{

        const img = (product.images && product.images.length) ? product.images[0] : null;
        const imgUrl = img && img.image_url ? img.image_url : 'images/IMG_6489.JPG';
        const alt = (img && img.alt_text) ? img.alt_text : product.name;

        return `<article class="product-card">
          <img class="product-thumb" src="${imgUrl}" alt="${alt}" loading="lazy" style="width:100%;height:220px;object-fit:cover;border-radius:18px;background:rgba(255,255,255,.6);" />

          <span class="badge">${product.category}</span>
          <h3>${product.name}</h3>
          <p class="muted">${product.material}</p>
          <p class="muted">${product.description}</p>
          <div class="price">₹${product.price.toLocaleString('en-IN')}</div>
          <a class="btn-primary" href="product.html?id=${product.id}">View Product</a>
        </article>`;

      }).join('');
    }
  </script>
  <script src="script.js" defer></script>
</body>
</html>
